<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cargar gasto fijo — HC Odontología</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

  <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg pb-24">

    <!-- Header -->
    <header class="bg-orange-500 text-white px-4 py-4 flex items-center gap-3 sticky top-0 z-10">
      <a href="index.html" class="text-2xl hover:opacity-70">←</a>
      <h1 class="text-lg font-bold">Nuevo gasto fijo</h1>
    </header>

    <!-- AVISO MAQUETA -->
    <div class="mx-4 mt-4 bg-yellow-50 border border-yellow-200 rounded-xl p-3 text-xs text-yellow-800">
      🚧 <strong>Maqueta visual.</strong> Esta pantalla muestra cómo se verá el módulo de Gastos fijos. La funcionalidad completa se implementará después del TP.
    </div>

    <form onsubmit="event.preventDefault(); document.getElementById('toast').classList.remove('hidden'); setTimeout(() => window.location.href='index.html', 1500);" class="p-4 space-y-4">

      <!-- FECHA -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Fecha</label>
        <input type="date" value="2026-07-07"
               class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl focus:border-orange-500 focus:outline-none">
      </div>

      <!-- CATEGORÍA -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Categoría</label>
        <div class="flex gap-2">
          <select class="flex-1 px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl focus:border-orange-500 focus:outline-none">
            <option>Alquiler</option>
            <option>Alarma</option>
            <option>Camuzzi</option>
            <option selected>EDEA</option>
            <option>Internet</option>
            <option>Limpieza Graciela</option>
            <option>Limpieza Insumos</option>
            <option>Obras Sanitarias</option>
            <option>Seguro</option>
            <option>Sist. Ambiental</option>
          </select>
          <button type="button" class="px-4 py-3 bg-orange-50 hover:bg-orange-100 border border-orange-300 text-orange-700 rounded-xl font-semibold transition">
            ➕
          </button>
        </div>
      </div>

      <!-- MONTO -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Monto</label>
        <div class="relative">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-lg">$</span>
          <input type="text" value="44.259"
                 class="w-full pl-8 pr-4 py-3 bg-gray-50 border border-gray-300 rounded-xl focus:border-orange-500 focus:outline-none text-lg">
        </div>
        <p class="text-xs text-gray-500 mt-1">
          💡 Autocompletado con el último monto pagado (junio: $42.533).
        </p>
      </div>

      <!-- NOTAS -->
      <div>
        <button type="button" class="text-sm text-orange-600 font-semibold">+ Agregar notas</button>
      </div>

      <!-- GUARDAR -->
      <button type="submit"
              class="w-full flex items-center justify-center gap-2 bg-orange-500 hover:bg-orange-600 text-white text-lg font-semibold py-4 rounded-2xl shadow-md transition mt-4">
        <span class="text-xl">💾</span>
        <span>Guardar gasto</span>
      </button>
    </form>

    <!-- TOAST -->
    <div id="toast" class="hidden fixed top-20 left-1/2 -translate-x-1/2 bg-yellow-500 text-white px-6 py-3 rounded-xl shadow-lg z-50 font-semibold text-sm">
      🚧 Guardado simulado (maqueta)
    </div>

    <!-- Barra inferior -->
    <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-gray-200 flex justify-around py-2 shadow-lg">
      <a href="index.html" class="flex flex-col items-center text-gray-400 text-xs">
        <span class="text-2xl">🏠</span><span>Inicio</span>
      </a>
      <a href="lista-ventas.html" class="flex flex-col items-center text-gray-400 text-xs">
        <span class="text-2xl">📋</span><span>Listas</span>
      </a>
      <a href="#" class="flex flex-col items-center text-gray-400 text-xs">
        <span class="text-2xl">📁</span><span>Catálogos</span>
      </a>
      <a href="#" class="flex flex-col items-center text-gray-400 text-xs">
        <span class="text-2xl">☰</span><span>Menú</span>
      </a>
    </nav>

  </div>

</body>
</html>
